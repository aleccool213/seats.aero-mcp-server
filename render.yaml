services:
  - type: web
    name: seats-aero-mcp
    env: node
    region: oregon
    plan: starter   # $7/mo - never sleeps (recommended for MCP)
    # plan: free    # Free tier (spins down after 15 min inactivity)
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node build/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_TRANSPORT
        value: http
      # === Secrets - set these in the Render dashboard (never commit real values) ===
      - key: SEATS_API_KEY
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false   # Generate a strong random token (e.g. using `openssl rand -hex 32`)
    healthCheckPath: /healthz
    autoDeploy: true
