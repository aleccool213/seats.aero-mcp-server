app = "seats-aero-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  MCP_TRANSPORT = "http"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0   # Set to 1 if you want it always on (cheap ~$2-3/mo)

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[checks]
  [checks.health]
    port = 3000
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
